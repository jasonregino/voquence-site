<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Voquence X Banner — 1500x500</title>
  <style>
    /* Matches the actual voquence.com restraint:
       - Wordmark is FLAT cyan, no glow (site h1 has no text-shadow)
       - Tagline is muted gray
       - Only the border-frame glows (matches the card style)
       - Background is dark with subtle grid, no radial wash
       Content is biased upward so the X profile avatar circle in the
       lower-left does NOT clip the tagline. */
    :root {
      --brand-cyan: #00D4FF;
      --brand-bg: #0a0a0a;
      --brand-muted: #888;
      --grid-line: rgba(0, 212, 255, 0.07);
    }
    html, body {
      margin: 0;
      padding: 0;
      background: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body.export {
      background: var(--brand-bg);
      width: 1500px;
      height: 500px;
      min-height: 0;
      overflow: hidden;
    }
    body.export .hint { display: none; }
    .banner {
      width: 1500px;
      height: 500px;
      background: var(--brand-bg);
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 50px 50px;
      position: relative;
      overflow: hidden;
      font-family: 'SF Mono', 'JetBrains Mono', ui-monospace, Menlo, monospace;
    }
    .border-frame {
      position: absolute;
      top: 40px;
      left: 40px;
      right: 40px;
      bottom: 40px;
      border: 2px solid var(--brand-cyan);
      border-radius: 18px;
      /* Match the site card glow — moderate, not aggressive */
      box-shadow:
        0 0 32px rgba(0, 212, 255, 0.32),
        inset 0 0 24px rgba(0, 212, 255, 0.04);
      display: flex;
      flex-direction: column;
      align-items: center;
      /* Content sits in the UPPER half so the X avatar in the lower-left
         doesn't overlap the tagline. padding-top pushes everything up. */
      justify-content: flex-start;
      padding-top: 110px;
    }
    .wordmark {
      color: var(--brand-cyan);
      font-size: 130px;
      font-weight: 900;
      letter-spacing: 0.24em;
      line-height: 1;
      /* Offset for letter-spacing so visual center matches frame center */
      padding-left: 0.24em;
      /* No text-shadow — site wordmark is flat */
    }
    .tagline {
      color: var(--brand-muted);
      font-size: 24px;
      letter-spacing: 0.32em;
      margin-top: 36px;
      text-transform: uppercase;
      padding-left: 0.32em;
      font-weight: 400;
    }
    .tagline .dot {
      color: var(--brand-cyan);
      margin: 0 0.5em;
    }
    .hint {
      position: fixed;
      top: 8px;
      left: 8px;
      color: #888;
      font: 12px/1.4 system-ui;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="hint">Screenshot the banner below at native size (1500×500).</div>
  <div class="banner">
    <div class="border-frame">
      <div class="wordmark">VOQUENCE</div>
      <div class="tagline">SPEAK ROUGH IDEAS<span class="dot">·</span>GET POLISHED OUTPUT</div>
    </div>
  </div>
  <script>
    if (new URLSearchParams(window.location.search).get('export') === '1') {
      document.body.classList.add('export');
    }
  </script>
</body>
</html>
